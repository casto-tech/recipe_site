version: 2

updates:
  # ── Python dependencies ────────────────────────────────────────────────────
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    target-branch: dev        # PRs open against dev, not main
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "deps"
    groups:
      # Group all non-security updates into a single weekly PR
      # to reduce noise. Security updates are always individual PRs.
      python-minor-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Los_Angeles
    target-branch: dev
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "ci"
