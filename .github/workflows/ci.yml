name: CI — Tests & Linting

on:
  workflow_call:

permissions:
  contents: read


jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: recipes_test
          POSTGRES_USER: recipes_user
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DJANGO_SECRET_KEY: ci-test-secret-key-not-used-in-production
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost
      # ADMIN_ENABLED=True so test_security.py can test admin availability in dev
      ADMIN_ENABLED: "True"
      DB_NAME: recipes_test
      DB_USER: recipes_user
      DB_PASSWORD: testpassword
      DB_HOST: localhost
      DB_PORT: 5432
      # Blob storage intentionally left blank — CI uses local filesystem
      AZURE_STORAGE_ACCOUNT_NAME: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run linting (flake8)
        run: flake8 recipes/ config/ --max-line-length=120 --exclude=migrations

      - name: Run formatting check (black)
        run: black --check recipes/ config/ tests/

      - name: Run database migrations
        run: python manage.py migrate --noinput

      - name: Run test suite with coverage
        run: |
          pytest tests/ \
            --cov=recipes \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7
