name: Security — SAST, CVE & Image Scan

on:
  workflow_call:

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  # ── Job 1: Python dependency CVE audit ────────────────────────────────────
  dependency-audit:
    name: Python CVE Audit (pip-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pip-audit
        # Fails the pipeline on any HIGH or CRITICAL CVE in installed packages
        run: pip-audit --strict --vulnerability-service pypi

  # ── Job 2: Python SAST (bandit) ───────────────────────────────────────────
  sast:
    name: Python SAST (bandit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit SAST scan
        # -ll = report only MEDIUM and above severity issues
        # -ii = report only MEDIUM and above confidence issues
        # Fails if any HIGH severity finding is detected
        run: |
          bandit -r recipes/ config/ \
            -ll -ii \
            --exclude recipes/migrations \
            -f json \
            -o bandit-report.json || true
          # Parse results and fail on HIGH severity
          python -c "
          import json, sys
          with open('bandit-report.json') as f:
              report = json.load(f)
          high_issues = [
              r for r in report.get('results', [])
              if r['issue_severity'] == 'HIGH'
          ]
          if high_issues:
              print(f'FAIL: {len(high_issues)} HIGH severity finding(s):')
              for issue in high_issues:
                  print(f'  [{issue[\"test_id\"]}] {issue[\"issue_text\"]} — {issue[\"filename\"]}:{issue[\"line_number\"]}')
              sys.exit(1)
          print(f'PASS: No HIGH severity findings. Total issues: {len(report.get(\"results\", []))}')
          "

      - name: Upload bandit report
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  # ── Job 3: CodeQL Static Analysis ─────────────────────────────────────────
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@c10b8064de6f491fea524254123dbe5e09572f13  # v4
        with:
          languages: python
          # Queries: security-extended catches more issues than the default set
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@c10b8064de6f491fea524254123dbe5e09572f13  # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@c10b8064de6f491fea524254123dbe5e09572f13  # v4
        with:
          category: "/language:python"
          # Results uploaded to GitHub Security tab as SARIF
          # Does not fail the pipeline — findings are tracked in Security tab

  # ── Job 4: Docker Image CVE Scan (Trivy) ──────────────────────────────────
  trivy:
    name: Docker Image CVE Scan (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5

      - name: Build Docker image for scanning
        run: |
          docker build \
            --build-arg DJANGO_SECRET_KEY=scan-placeholder-not-real \
            -t recipesite:scan \
            .

      # Table scan — this is the gate. Prints findings to the CI log AND fails
      # the job on any fixable HIGH/CRITICAL CVE. Table format correctly applies
      # ignore-unfixed; SARIF mode does not (it builds with all severities first).
      - name: Trivy scan (table — security gate)
        uses: aquasecurity/trivy-action@b2933f565dbc598b29947660e66259e3c7bc8561  # v0.20.0
        with:
          image-ref: recipesite:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      # SARIF scan — reporting only, never fails the job. Uploads results to
      # the GitHub Security tab for tracking even when the gate above passes.
      - name: Trivy scan (SARIF — reporting only)
        uses: aquasecurity/trivy-action@b2933f565dbc598b29947660e66259e3c7bc8561  # v0.20.0
        if: always()
        with:
          image-ref: recipesite:scan
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13  # v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-docker

      - name: Upload Trivy SARIF artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        if: always()
        with:
          name: trivy-scan-results
          path: trivy-results.sarif
          retention-days: 7
          
