name: Deploy — Build, Push & Deploy to Azure

on:
  workflow_call:

# Prevent concurrent deploys — if a deploy is running, cancel it before
# starting a new one. Prevents race conditions on the Container App.
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  # ── Job 1: Build and push Docker image to ACR ─────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        # Tag image with both the git SHA (immutable) and 'latest' (mutable)
        run: |
          SHA_TAG="${{ secrets.ACR_LOGIN_SERVER }}/recipesite:${{ github.sha }}"
          LATEST_TAG="${{ secrets.ACR_LOGIN_SERVER }}/recipesite:latest"
          echo "image-tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "sha-tag=${SHA_TAG}" >> $GITHUB_OUTPUT
          echo "latest-tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Push both SHA tag and latest tag
          tags: |
            ${{ steps.meta.outputs.sha-tag }}
            ${{ steps.meta.outputs.latest-tag }}
          # Use GitHub Actions cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Pass dummy SECRET_KEY for collectstatic during build only
          # ADMIN_ENABLED=False ensures the production image has no admin surface
          build-args: |
            DJANGO_SECRET_KEY=build-time-placeholder-not-used-at-runtime
            DJANGO_SETTINGS_MODULE=config.settings.production
            ADMIN_ENABLED=False

      - name: Verify image was pushed
        run: |
          docker manifest inspect ${{ steps.meta.outputs.sha-tag }}
          echo "Image pushed successfully: ${{ steps.meta.outputs.sha-tag }}"

  # ── Job 2: Deploy to Azure Container Apps ─────────────────────────────────
  deploy:
    name: Deploy to Azure Container Apps
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # Requires environment approval if configured

    steps:
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy new revision to Azure Container Apps
        env:
          APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
          RG: ${{ secrets.RESOURCE_GROUP }}
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/recipesite:${{ github.sha }}
        run: |
          az containerapp update \
            --name "${APP_NAME//[$'\t\r\n ']}" \
            --resource-group "${RG//[$'\t\r\n ']}" \
            --image "${IMAGE//[$'\t\r\n ']}"

      - name: Run database migrations
        # Runs migrations as a one-off Container Apps job using the same image.
        # az containerapp exec requires an interactive TTY (unavailable in CI).
        env:
          APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
          RG: ${{ secrets.RESOURCE_GROUP }}
          IMAGE: ${{ secrets.ACR_LOGIN_SERVER }}/recipesite:${{ github.sha }}
          ACR_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
          ACR_USER: ${{ secrets.ACR_USERNAME }}
          ACR_PASS: ${{ secrets.ACR_PASSWORD }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_HOST: ${{ secrets.DB_HOST }}
        run: |
          JOB_NAME="migrate-$(echo ${{ github.sha }} | cut -c1-7)"
          APP="${APP_NAME//[$'\t\r\n ']}"
          RGROUP="${RG//[$'\t\r\n ']}"
          IMG="${IMAGE//[$'\t\r\n ']}"
          REG="${ACR_SERVER//[$'\t\r\n ']}"
          REG_USER="${ACR_USER//[$'\t\r\n ']}"
          REG_PASS="${ACR_PASS//[$'\t\r\n ']}"
          ENV_ID=$(az containerapp show --name "$APP" --resource-group "$RGROUP" --query "properties.environmentId" -o tsv)
          az containerapp job create \
            --name "$JOB_NAME" \
            --resource-group "$RGROUP" \
            --environment "$ENV_ID" \
            --image "$IMG" \
            --replica-timeout 300 \
            --replica-retry-limit 1 \
            --trigger-type Manual \
            --registry-server "$REG" \
            --registry-username "$REG_USER" \
            --registry-password "$REG_PASS" \
            --env-vars \
              DJANGO_SETTINGS_MODULE=config.settings.production \
              "DJANGO_SECRET_KEY=$DJANGO_SECRET_KEY" \
              "DB_NAME=$DB_NAME" \
              "DB_USER=$DB_USER" \
              "DB_PASSWORD=$DB_PASSWORD" \
              "DB_HOST=$DB_HOST" \
              DB_PORT=5432 \
            --command "python manage.py migrate --noinput"
          az containerapp job start --name "$JOB_NAME" --resource-group "$RGROUP"
          for i in $(seq 1 30); do
            STATUS=$(az containerapp job execution list --name "$JOB_NAME" --resource-group "$RGROUP" --query "[0].properties.status" -o tsv)
            echo "Migration job status: $STATUS"
            if [ "$STATUS" = "Succeeded" ]; then
              echo "Migrations completed successfully."
              az containerapp job delete --name "$JOB_NAME" --resource-group "$RGROUP" --yes
              break
            elif [ "$STATUS" = "Failed" ]; then
              echo "Migration job failed."
              az containerapp job delete --name "$JOB_NAME" --resource-group "$RGROUP" --yes
              exit 1
            fi
            sleep 10
          done

      - name: Smoke test — verify health endpoint
        # Poll the health endpoint for up to 2 minutes after deploy.
        # If it never returns 200, the pipeline fails and raises visibility
        # that something is wrong with the new revision.
        run: |
          echo "Waiting for deployment to become healthy..."
          MAX_ATTEMPTS=24
          SLEEP_SECONDS=5
          ATTEMPT=0
          until curl --silent --fail --max-time 10 "${{ secrets.HEALTH_CHECK_URL }}"; do
            ATTEMPT=$((ATTEMPT + 1))
            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "FAIL: Health check did not return 200 after $((MAX_ATTEMPTS * SLEEP_SECONDS)) seconds."
              echo "The previous revision remains active. Investigate the new revision logs in Azure Monitor."
              exit 1
            fi
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS — not ready yet, retrying in ${SLEEP_SECONDS}s..."
            sleep $SLEEP_SECONDS
          done
          echo "PASS: Health check returned 200. Deployment successful."

      - name: Smoke test — verify admin is absent in production
        # The admin must return 404 in production — not 200, not 302.
        # A 302 (redirect to login) would indicate the admin is mounted, which is a failure.
        run: |
          BASE_URL=$(echo "${{ secrets.HEALTH_CHECK_URL }}" | sed 's|/health/||')
          ADMIN_STATUS=$(curl --silent --output /dev/null --write-out "%{http_code}" --max-time 10 "${BASE_URL}/management/")
          if [ "$ADMIN_STATUS" != "404" ]; then
            echo "FAIL: /management/ returned HTTP ${ADMIN_STATUS} — expected 404. Admin must not be accessible in production."
            exit 1
          fi
          echo "PASS: /management/ returned HTTP 404 — admin is correctly absent from production."

      - name: Log out of Azure
        if: always()
        run: az logout
