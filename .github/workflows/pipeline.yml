name: Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Prevent concurrent pipeline runs on the same ref
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI — Tests & Linting
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  security:
    name: Security — SAST, CVE & Image Scan
    needs: ci
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: ./.github/workflows/security.yml
    secrets: inherit

  deploy:
    name: Deploy — Build, Push & Deploy to Azure
    needs: security
    # Only deploy on direct pushes to main, not on PRs or other branches
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
