name: Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Prevent concurrent pipeline runs on the same ref
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

# Deny all permissions by default; each job grants only what it needs.
permissions: {}

jobs:
  ci:
    name: CI — Tests & Linting
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml
    # No secrets required — all values are set as env vars inside ci.yml

  security:
    name: Security — SAST, CVE & Image Scan
    needs: ci
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: ./.github/workflows/security.yml
    # No secrets required — pip-audit, bandit, CodeQL, and Trivy need none

  deploy:
    name: Deploy — Build, Push & Deploy to Azure
    needs: security
    # Only deploy on direct pushes to main, not on PRs or other branches
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/deploy.yml
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
      CONTAINER_APP_NAME: ${{ secrets.CONTAINER_APP_NAME }}
      RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
      DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
      HEALTH_CHECK_URL: ${{ secrets.HEALTH_CHECK_URL }}
