{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Recipe Repo{% endblock %}</title>

  {% if debug %}
  <!-- Local dev only: Tailwind CDN Play + config. Production uses compiled static bundle. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="{% static 'js/tailwind.config.js' %}"></script>
  {% else %}
  <link rel="stylesheet" href="{% static 'css/tailwind.output.css' %}" />
  {% endif %}

  <!-- Alpine.js 3.14.1 — self-hosted, eliminates unpkg.com CDN dependency -->
  <script defer src="{% static 'js/alpinejs.min.js' %}"></script>

  <!-- HTMX 1.9.10 — self-hosted, eliminates unpkg.com CDN dependency -->
  <script src="{% static 'js/htmx.min.js' %}"></script>

  <!-- Google Fonts: Playfair Display + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{% static 'css/app.css' %}" />
</head>
<body class="font-sans antialiased">
  {% block content %}{% endblock %}
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
