<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Recipe Repo{% endblock %}</title>

  <!-- Tailwind CSS via CDN Play — config loaded from static file to avoid inline scripts -->
  <script src="https://cdn.tailwindcss.com"></script>
  {% load static %}
  <script src="{% static 'js/tailwind.config.js' %}"></script>

  <!-- Alpine.js 3.14.1 — pinned version with SRI integrity hash -->
  <script defer
    src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"
    integrity="sha384-l8f0VcPi/M1iHPv8egOnY/15TDwqgbOR1anMIJWvU6nLRgZVLTLSaNqi/TOoT5Fh"
    crossorigin="anonymous"></script>

  <!-- HTMX 1.9.10 — pinned version with SRI integrity hash -->
  <script
    src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js"
    integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC"
    crossorigin="anonymous"></script>

  <!-- Google Fonts: Playfair Display + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/app.css' %}" />
</head>
<body class="font-sans antialiased" style="background-color:#faf7f2; color:#1c1c1c;">
  {% block content %}{% endblock %}
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
