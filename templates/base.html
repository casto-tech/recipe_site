<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Recipe Repo{% endblock %}</title>

  <!-- Tailwind CSS via CDN Play -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            forest: {
              50:  '#f2f7f0',
              100: '#ddecd8',
              200: '#bcd9b4',
              300: '#8fbe82',
              400: '#63a054',
              500: '#448540',
              600: '#326832',
              700: '#28522a',
              800: '#1e3d20',
              900: '#152c17',
            },
            cream:    '#faf7f2',
            parchment:'#f4efe6',
            stone:    '#e8e0d5',
            terracotta:'#c5602a',
            gold:     '#b8860b',
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans:  ['"DM Sans"', 'system-ui', 'sans-serif'],
          },
          boxShadow: {
            'card':    '0 2px 12px 0 rgba(0,0,0,0.07)',
            'card-lg': '0 8px 32px 0 rgba(0,0,0,0.13)',
          },
        },
      },
    };
  </script>

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  <!-- Google Fonts: Playfair Display + DM Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/app.css' %}" />
</head>
<body class="font-sans antialiased" style="background-color:#faf7f2; color:#1c1c1c;">
  {% block content %}{% endblock %}
  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
