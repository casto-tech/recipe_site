<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}The Recipe Book{% endblock %}</title>

  <!-- Tailwind CSS via CDN Play -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            parchment: '#fdf6e3',
            cream: '#faf3dc',
            bark:   '#8b6914',
            spice:  '#c0392b',
          },
          fontFamily: {
            serif: ['"Playfair Display"', 'Georgia', 'serif'],
            sans:  ['"Lato"', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Alpine.js -->
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  {% load static %}
  <link rel="stylesheet" href="{% static 'css/app.css' %}" />

  <style>
    body { background-color: #fdf6e3; }
    .recipe-card { perspective: 1000px; }
  </style>
</head>
<body class="min-h-screen font-sans text-gray-800" style="background-color: #fdf6e3;">

  {% block content %}{% endblock %}

  <script src="{% static 'js/app.js' %}"></script>
</body>
</html>
