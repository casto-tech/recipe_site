{% comment %}
Recipe detail overlay — rendered inside the Alpine.js x-data scope from index.html.
Uses x-show and x-transition for smooth animation.
{% endcomment %}

<!-- Backdrop -->
<div
  x-show="activeRecipe !== null"
  x-transition:enter="transition ease-out duration-200"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  x-transition:leave="transition ease-in duration-150"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  @click.self="activeRecipe = null"
  @keydown.escape.window="activeRecipe = null"
  class="fixed inset-0 z-50 bg-forest-900/70 backdrop-blur-sm flex items-end sm:items-center justify-center p-0 sm:p-6"
  style="display: none;"
  role="dialog"
  aria-modal="true"
>

  <!-- Modal panel -->
  <div
    x-show="activeRecipe !== null"
    x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-y-8 sm:translate-y-0 sm:scale-95"
    x-transition:enter-end="opacity-100 translate-y-0 sm:scale-100"
    x-transition:leave="transition ease-in duration-200"
    x-transition:leave-start="opacity-100 translate-y-0 sm:scale-100"
    x-transition:leave-end="opacity-0 translate-y-8 sm:translate-y-0 sm:scale-95"
    @click.stop
    class="relative bg-cream w-full sm:max-w-2xl lg:max-w-3xl rounded-t-3xl sm:rounded-3xl
           shadow-2xl overflow-hidden max-h-[92vh] sm:max-h-[88vh] flex flex-col"
    style="display: none;"
  >
    <!-- Hero image -->
    <div class="relative w-full h-52 sm:h-64 flex-shrink-0 bg-parchment overflow-hidden">
      <img
        :src="activeRecipe.image"
        :alt="activeRecipe.title"
        class="w-full h-full object-cover"
      />
      <!-- Dark gradient for title readability -->
      <div class="absolute inset-0 bg-gradient-to-t from-forest-900/80 via-forest-900/20 to-transparent"></div>

      <!-- Close button -->
      <button
        @click="activeRecipe = null"
        class="absolute top-4 right-4 w-9 h-9 rounded-full bg-white/20 hover:bg-white/40
               backdrop-blur-sm flex items-center justify-center transition-colors duration-150
               text-white focus:outline-none focus:ring-2 focus:ring-white/60"
        aria-label="Close recipe"
      >
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

      <!-- Title + tags on image -->
      <div class="absolute bottom-0 left-0 right-0 p-5">
        <div class="flex flex-wrap gap-1.5 mb-2"
             x-show="activeRecipe.tags && activeRecipe.tags.length > 0">
          <template x-for="tag in activeRecipe.tags" :key="tag">
            <span class="inline-block px-2.5 py-0.5 text-xs font-medium rounded-full
                         bg-forest-400/30 text-forest-100 border border-forest-300/30 backdrop-blur-sm"
                  x-text="tag"></span>
          </template>
        </div>
        <h2 class="font-serif text-2xl sm:text-3xl font-bold text-white leading-snug"
            x-text="activeRecipe.title"></h2>
      </div>
    </div>

    <!-- Scrollable body -->
    <div class="overflow-y-auto flex-1 p-5 sm:p-7">

      <!-- Two-column layout on sm+ screens -->
      <div class="flex flex-col sm:flex-row gap-7 sm:gap-10">

        <!-- Ingredients -->
        <div class="sm:w-2/5 flex-shrink-0">
          <div class="flex items-center gap-2 mb-4">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="flex-shrink-0">
              <!-- 3D bowl: outer wall curve + rim ellipse + inner surface ellipse -->
              <path d="M2 12 Q2 21 11 21 Q20 21 20 12" stroke="#63a054" stroke-width="1.8" stroke-linecap="round" fill="none"/>
              <ellipse cx="11" cy="12" rx="9" ry="3" stroke="#63a054" stroke-width="1.8" fill="none"/>
              <ellipse cx="11" cy="13" rx="6" ry="1.8" stroke="#63a054" stroke-width="1" fill="none"/>
              <!-- Spoon: oval head + handle resting into bowl -->
              <ellipse cx="18" cy="5" rx="1.8" ry="2.5" stroke="#63a054" stroke-width="1.8"/>
              <line x1="17.5" y1="7.5" x2="14.5" y2="17" stroke="#63a054" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
            <h3 class="font-serif text-lg font-semibold text-forest-900">Ingredients</h3>
          </div>
          <ul class="space-y-2.5">
            <template x-for="(ingredient, i) in activeRecipe.ingredients" :key="i">
              <li class="flex items-start gap-3 text-sm text-gray-700 leading-snug">
                <span class="mt-1.5 w-1.5 h-1.5 rounded-full bg-forest-400 flex-shrink-0"></span>
                <span x-text="ingredient"></span>
              </li>
            </template>
          </ul>
        </div>

        <!-- Vertical divider (desktop only) -->
        <div class="hidden sm:block w-px bg-stone flex-shrink-0"></div>

        <!-- Horizontal divider (mobile only) -->
        <hr class="sm:hidden border-stone" />

        <!-- Directions -->
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-4">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" class="flex-shrink-0">
              <!-- 3D frying pan: outer rim ellipse + inner cooking surface + thick handle with end cap -->
              <ellipse cx="9" cy="14" rx="6" ry="4.5" stroke="#8c3420" stroke-width="1.8"/>
              <ellipse cx="9" cy="12.5" rx="4.5" ry="3" stroke="#8c3420" stroke-width="1"/>
              <line x1="3" y1="14" x2="4.5" y2="12.5" stroke="#8c3420" stroke-width="1.8" stroke-linecap="round"/>
              <line x1="15" y1="14" x2="13.5" y2="12.5" stroke="#8c3420" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M15 12 L21 9" stroke="#8c3420" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M15 13.5 L21 10.5" stroke="#8c3420" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M21 9 Q22.2 9.75 21 10.5" stroke="#8c3420" stroke-width="1.8" stroke-linecap="round" fill="none"/>
            </svg>
            <h3 class="font-serif text-lg font-semibold text-forest-900">Directions</h3>
          </div>
          <ol class="space-y-4">
            <template x-for="(step, i) in activeRecipe.directions" :key="i">
              <li class="flex items-start gap-3 text-sm text-gray-700 leading-relaxed">
                <span class="flex-shrink-0 w-6 h-6 rounded-full bg-[#8c3420] text-[#e8d0b4]
                             font-semibold text-xs flex items-center justify-center mt-0.5"
                      x-text="i + 1"></span>
                <span x-text="step"></span>
              </li>
            </template>
          </ol>
        </div>

      </div>
    </div>
  </div>

</div>
